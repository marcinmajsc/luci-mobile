name: Release iOS

on:
  workflow_dispatch:


jobs:  
  build-android:      
    name: Build iOS 
    runs-on: macos-26

    steps:
        #1 Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract app version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -n 1 | sed 's/version:[[:space:]]*//' | cut -d+ -f1)
          echo "Version: $VERSION"
          echo "APP_VERSION=v$VERSION" >> $GITHUB_ENV

        #2 Setup Java
      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

        #4 Install Dependencies
      - name: Install Dependencies
        run: flutter pub get
      
      - name: Build iOS archive (unsigned)
        run: flutter build ipa --release --no-codesign

      - name: Package unsigned IPA from archive
        run: |
          ls -lah build/ios/
          set -euo pipefail
          ARCHIVE_PATH="build/ios/archive/Runner.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Runner.app"
          IPA_DIR="build/ios/ipa"
          PAYLOAD_DIR="build/ios/unsigned/Payload"

          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found in archive: $APP_PATH"
            exit 1
          fi

          rm -rf "build/ios/unsigned"
          mkdir -p "$PAYLOAD_DIR" "$IPA_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          (
            cd "build/ios/unsigned"
            /usr/bin/zip -qry "../ipa/Runner-unsigned.ipa" Payload
          )

          echo "Created unsigned IPA: $IPA_DIR/Runner-unsigned.ipa"

      - name: Upload Artifacts xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive
          path: |
            build/ios/ipa/*
            build/ios/archive/*.xcarchive

      - name: Upload Artifacts unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: |
            build/ios/ipa/*

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          
          # If no previous tag exists, use the first commit
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          
          # Generate commit messages since the previous tag
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md
          git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..${{ github.ref_name }} >> release_notes.md
          
          # Set the release notes as output
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1.20.0
        with:
          artifacts: "build/ios/ipa/Runner-unsigned.ipa"
          tag: ${{ github.ref_name }}
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
